name: "🐛 Bug report"
description: Report a problem so we can fix it
title: "[Bug]: "
labels: ["type: bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.
        For security vulnerabilities, **do not** open an issue — see [SECURITY.md](../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I … I expected … but instead …
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to …
        2. Click …
        3. See error …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of DLC OS?
      options:
        - API / Core
        - Web / Dashboard
        - AI
        - Discord
        - WhatsApp
        - Telegram
        - Payments
        - Marketplace
        - Infra / Deployment
        - Docs
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version/commit, OS, deployment (Docker/K8s), browser if relevant.
      placeholder: |
        - DLC OS version/commit:
        - OS:
        - Deployment:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs (redact secrets!) or attach screenshots.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: I removed any secrets/PII from logs
          required: true
